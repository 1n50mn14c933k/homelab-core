name: Change Request
description: Plan a safe homelab documentation or infrastructure change.
title: "[Change]: "
labels:

* change

* needs-review
  body:

* type: markdown
  attributes:
  value: |
  Use this template before making a meaningful change.

  ```
  Do not include passwords, tokens, private keys, real internal IP maps, or sensitive inventory.
  ```

* type: input
  id: summary
  attributes:
  label: Summary
  description: What are you changing?
  placeholder: "Example: Add sanitized network overview documentation"
  validations:
  required: true

* type: textarea
  id: reason
  attributes:
  label: Why is this change needed?
  description: Explain the reason for the change.
  placeholder: "This improves documentation for..."
  validations:
  required: true

* type: textarea
  id: affected
  attributes:
  label: Affected areas
  description: Which files, services, systems, or documentation areas are affected?
  placeholder: |
  - docs/01-network.md
  - inventory/hosts.example.yml
  validations:
  required: true

* type: dropdown
  id: backup
  attributes:
  label: Backup or snapshot status
  description: Confirm backup/snapshot status before making changes.
  options:
  - Not needed for this documentation-only change
  - Backup checked
  - Snapshot checked
  - Backup/snapshot needed before change
  - Unknown
  validations:
  required: true

* type: textarea
  id: security
  attributes:
  label: Security impact
  description: Describe any security impact.
  placeholder: "No secrets or sensitive values included. Public-safe examples only."
  validations:
  required: true

* type: textarea
  id: rollback
  attributes:
  label: Rollback plan
  description: How can this change be reverted if needed?
  placeholder: "Revert the pull request or restore the previous documented version."
  validations:
  required: true

* type: checkboxes
  id: safety
  attributes:
  label: Safety checklist
  options:
  - label: I checked that no real passwords are included.
  required: true
  - label: I checked that no API tokens are included.
  required: true
  - label: I checked that no SSH private keys are included.
  required: true
  - label: I checked that no VPN private keys are included.
  required: true
  - label: I checked that no real internal IP maps are included.
  required: true
  - label: I checked that no backup credentials are included.
  required: true
  - label: I documented rollback steps.
  required: true
