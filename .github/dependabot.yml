version: 2

updates:

# Keep GitHub Actions up to date.

* package-ecosystem: "github-actions"
  directory: "/"
  schedule:
  interval: "weekly"
  day: "monday"
  time: "08:00"
  timezone: "Etc/UTC"
  open-pull-requests-limit: 5
  commit-message:
  prefix: "deps"
  include: "scope"
  groups:
  github-actions:
  patterns:
  - "*"
