name: Change Request
description: Plan a homelab change safely before implementation
title: "change: "
labels:
  - change-request
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What do you want to change?
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: What could break or be affected?
    validations:
      required: true
  - type: textarea
    id: backup
    attributes:
      label: Backup or snapshot status
      description: What backup or snapshot exists before this change?
    validations:
      required: true
  - type: textarea
    id: rollback
    attributes:
      label: Rollback plan
      description: How will you undo this change if needed?
    validations:
      required: true
